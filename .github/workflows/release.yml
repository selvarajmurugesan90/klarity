name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without v prefix, e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      skip_docker:
        description: 'Skip Docker build (use when image already published)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  resolve-version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: resolve-version
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_docker == 'false' }}
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=Klarity
            org.opencontainers.image.description=Enterprise Kubernetes Observability Dashboard
            org.opencontainers.image.vendor=Klarity Contributors
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          body: |
            ## Docker Image

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ```

            ## Helm Install

            ```bash
            helm repo add klarity https://selvarajmurugesan90.github.io/klarity
            helm repo update
            helm install klarity klarity/klarity --namespace klarity --create-namespace
            ```

            ## kubectl Install

            ```bash
            kubectl apply -k https://github.com/${{ github.repository }}/deploy/manifests
            ```

  helm:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - docker
    if: ${{ always() && needs.resolve-version.result == 'success' && (needs.docker.result == 'success' || needs.docker.result == 'skipped') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Sync chart version with release tag
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/" helm/klarity/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/klarity/Chart.yaml

      - name: Publish chart to GitHub Pages
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: helm
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
