name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      # Copy built frontend to the embed path expected by internal/assets/assets.go
      - name: Copy frontend dist for Go embed
        run: |
          mkdir -p internal/assets/web
          cp -r web/dist internal/assets/web/dist

      # ── Backend ───────────────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy Go modules
        run: go mod tidy

      - name: Go lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
          args: --timeout=5m

      # ── Frontend lint ─────────────────────────────────────────────────────────
      - name: Frontend lint
        run: npm run lint
        working-directory: web

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      # Copy built frontend to the embed path expected by internal/assets/assets.go
      - name: Copy frontend dist for Go embed
        run: |
          mkdir -p internal/assets/web
          cp -r web/dist internal/assets/web/dist

      # ── Backend ───────────────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy Go modules
        run: go mod tidy

      - name: Go tests
        run: go test ./... -count=1 -timeout 120s

      # ── Frontend tests ────────────────────────────────────────────────────────
      - name: Frontend tests
        run: npm test -- --run --passWithNoTests
        working-directory: web

  build:
    name: Docker build (validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: klarity:ci
          build-args: |
            VERSION=ci
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
