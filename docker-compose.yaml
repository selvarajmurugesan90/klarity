version: "3.9"
services:
  klarity:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - KD_AUTH_MODE=none
      - KD_LOG_LEVEL=info
      - KD_LOG_FORMAT=text
      - KD_SERVER_METRICSENABLED=true
      - AWS_CLI_CACHE_DIR=/tmp/.aws/cli 
      - AWS_CLI_HISTORY_FILE=/tmp/.aws/gcl_history 
    volumes:
      - ${KUBECONFIG:-~/.kube/config}:/home/dashboard/.kube/config:ro
      - ${AWSCONFIG:-~/.aws}:/home/dashboard/.aws:ro 
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
